<h2>{{ form.get('id')?.value ? 'Editar Usuário' : 'Novo Usuário' }}</h2>

<form [formGroup]="form" class="form-container" (ngSubmit)="salvar()" autocomplete="off">

  <div *ngIf="id" class="form-group">
    <app-input
      label="Código"
      type="text"
      formControlName="id"
      [readonly]="true">
    </app-input>
  </div>

  <app-input
    label="Usuário"
    formControlName="userName"
    [required]="true"
    [error]="form.get('userName')?.invalid && formSubmetido ? 'Usuário é obrigatório' : ''">
  </app-input>

  <app-input
    label="E-mail"
    type="email"
    formControlName="email"
    [required]="true"
    [error]="form.get('email')?.invalid && formSubmetido ? 'E-mail obrigatório ou formato inválido' : ''">
  </app-input>

  <app-select
    label="Perfil"
    formControlName="role"
    [options]="tiposRole"
    [required]="true"
    [error]="form.get('role')?.invalid && formSubmetido ? 'Perfil é obrigatório' : ''">
  </app-select>

  <div class="form-group" *ngIf="form.get('role')?.value !== 'Suporte'">
    <app-select
      label="Empresa"
      formControlName="empresaId"
      [options]="empresaOptions"
      [required]="true"
      [error]="form.get('empresaId')?.invalid && formSubmetido ? 'Empresa é obrigatória' : ''">
    </app-select>
  </div>

  <div class="form-actions">
    <app-button
      type="submit"
      variant="primary"
      size="md"
      [disabled]="isSaving || form.invalid"
      [loading]="isSaving">
      <span *ngIf="!isSaving">Salvar</span>
      <span *ngIf="isSaving">Aguarde...</span>
    </app-button>

    <app-button
      type="button"
      variant="secondary"
      size="md"
      (click)="cancelar()">
      Cancelar
    </app-button>
  </div>
</form>
