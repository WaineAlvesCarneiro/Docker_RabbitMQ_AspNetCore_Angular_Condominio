<div class="loginContainer">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="loginForm form-container auth-card" autocomplete="off">
    <h2 class="card-title">Acessar sistema</h2>

    <div class="form-group">
      <app-input label="Usuário" id="username" type="text" formControlName="username" #focusInput></app-input>
    </div>
    <div *ngIf="form.get('username')?.invalid && form.get('username')?.touched" class="form-error">Usuário é obrigatório.</div>

    <div class="form-group">
      <app-input label="Senha" id="password" type="password" formControlName="password"></app-input>
    </div>
    <div *ngIf="form.get('password')?.invalid && form.get('password')?.touched" class="form-error">Senha é obrigatória.</div>

    <div class="form-actions">
      <app-button type="submit" variant="primary" [block]="true" [disabled]="isLogging || form.invalid">Entrar</app-button>
    </div>
  </form>
</div>
