<h2>{{ form.get('id')?.value ? 'Editar Imóvel' : 'Novo Imóvel' }}</h2>

<form [formGroup]="form" class="form-container" (ngSubmit)="salvar()" autocomplete="off">

  <div *ngIf="id" class="form-group">
    <app-input
      label="Código"
      type="number"
      formControlName="id"
      [readonly]="true"
      [maxLength]="10">
    </app-input>
  </div>

  <app-input
    label="Bloco"
    formControlName="bloco"
    [required]="true"
    [maxLength]="10"
    [error]="form.get('bloco')?.invalid && formSubmetido ? 'Bloco é obrigatório.' : ''">
  </app-input>

  <app-input
    label="Apartamento"
    formControlName="apartamento"
    [required]="true"
    [maxLength]="10"
    [error]="form.get('apartamento')?.invalid && formSubmetido ? 'Apartamento é obrigatório.' : ''">
  </app-input>

  <app-input
    label="Box Garagem"
    formControlName="boxGaragem"
    [required]="true"
    [error]="form.get('boxGaragem')?.invalid && formSubmetido ? 'Box Garagem é obrigatório.' : ''">
  </app-input>

  <div class="form-actions">
    <app-button type="submit" variant="primary" size="md" [disabled]="isSaving || form.invalid">{{ isSaving ? 'Aguarde...' : 'Salvar' }}</app-button>
    <app-button type="button" variant="outline" size="md" (click)="cancelar()">{{ userRole === 'Porteiro' ? 'Voltar' : 'Cancelar' }}</app-button>
  </div>
</form>
