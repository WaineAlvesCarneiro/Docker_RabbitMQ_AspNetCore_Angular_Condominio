<div class="container">
  <div class="header">
    <h2>Lista de Imóveis</h2>
    <app-button
      *ngIf="userRole !== 'Porteiro'"
      variant="primary"
      size="md"
      (click)="novo()"
    >
      Novo imóvel
    </app-button>
  </div>

  <app-table-filters (filtersChange)="onFiltersChange($event)"></app-table-filters>

  <table class="itens-table">
    <thead>
      <tr>
        <th>Código</th>
        <th>Bloco</th>
        <th>Apartamento</th>
        <th>Box</th>
        <th class="actions">Ações</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of imoveis">
        <td data-label="Código">{{ item.id }}</td>
        <td data-label="Bloco">{{ item.bloco }}</td>
        <td data-label="Apartamento">{{ item.apartamento }}</td>
        <td data-label="Box">{{ item.boxGaragem }}</td>
        <td class="actions" data-label="Ações">
          <app-button
            variant="outline"
            size="sm"
            (click)="editar(item.id)"
          >
            {{ userRole === 'Porteiro' ? 'Visualizar' : 'Editar' }}
          </app-button>

          <app-button
            *ngIf="userRole !== 'Porteiro'"
            variant="danger"
            size="sm"
            (click)="excluir(item.id)"
          >
            Excluir
          </app-button>
        </td>
      </tr>
    </tbody>
  </table>

  <app-pagination
    [totalCount]="totalCount"
    [pageIndex]="pageIndex"
    [pageSize]="pageSize"
    (pageChange)="onPageChange($event)">
  </app-pagination>
</div>
