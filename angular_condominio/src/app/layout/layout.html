<div class="app-container">
  <header class="app-header">
    <h1>{{ title() }}</h1>
  </header>
  <div class="app-body">
    <aside class="app-sidebar" [class.minimized]="isSidebarMinimized"
      (mouseenter)="isSidebarMinimized = false"
      (mouseleave)="isSidebarMinimized = true">

      <div class="user-info" *ngIf="isLoggedIn && userName">
        <span *ngIf="!isSidebarMinimized">{{ userName }}</span>
        <span *ngIf="isSidebarMinimized">👤</span>
      </div>
      <nav class="main-nav">
        <ul>
          <li *ngIf="isSindicoOrPorteiro">
            <a routerLink="/imoveis" routerLinkActive="active">
              <span *ngIf="!isSidebarMinimized">Imóveis</span>
              <span *ngIf="isSidebarMinimized">🏠</span>
            </a>
          </li>
          <li *ngIf="isSindicoOrPorteiro">
            <a routerLink="/moradores" routerLinkActive="active">
              <span *ngIf="!isSidebarMinimized">Moradores</span>
              <span *ngIf="isSidebarMinimized">👥</span>
            </a>
          </li>
          <li *ngIf="isSuporte">
            <a routerLink="/empresas" routerLinkActive="active">
              <span *ngIf="!isSidebarMinimized">Empresas</span>
              <span *ngIf="isSidebarMinimized">🏢</span>
            </a>
          </li>
          <li *ngIf="isSuporte">
            <a routerLink="/usuarios" routerLinkActive="active">
              <span *ngIf="!isSidebarMinimized">Usuários</span>
              <span *ngIf="isSidebarMinimized">👤</span>
            </a>
          </li>
        </ul>
      </nav>

      <div class="logout-container">
        <button class="nav-button" (click)="logout()">
          <span *ngIf="!isSidebarMinimized">Sair</span>
          <span *ngIf="isSidebarMinimized">🚪</span>
        </button>
      </div>
    </aside>
    <main class="main-content" [class.minimized]="isSidebarMinimized">
      <router-outlet></router-outlet>
    </main>
  </div>
  <footer class="app-footer">
    <p>&copy; Condomínio 2025</p>
  </footer>
</div>
