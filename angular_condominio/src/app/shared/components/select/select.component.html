<div class="form-group">
  <label
    *ngIf="label"
    class="form-label"
    [ngClass]="{ required: required }">
    {{ label }}
  </label>

  <select
    [class]="getSelectClasses()"
    [(ngModel)]="value"
    [disabled]="disabled"
    [required]="required"
    [multiple]="multiple"
    (ngModelChange)="onSelectChange($event)"
    (blur)="onSelectBlur()">

    <option
      *ngIf="!multiple"
      [ngValue]="null"
      disabled>
      {{ placeholder }}
    </option>

    <option
      *ngFor="let option of options"
      [ngValue]="option.value"
      [disabled]="option.disabled">
      {{ option.label }}
    </option>

  </select>

  <span
    *ngIf="hasError"
    class="form-error">
    {{ error }}
  </span>

  <span
    *ngIf="hint && !hasError"
    class="form-hint">
    {{ hint }}
  </span>

</div>
