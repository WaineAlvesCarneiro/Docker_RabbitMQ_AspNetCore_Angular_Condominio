<div class="form-group">
  <label *ngIf="label" [ngClass]="{ required: required }" class="form-label">
    {{ label }}
  </label>
  <input
    [id]="id"
    [ngClass]="getInputClasses()"
    type="date"
    [value]="value"
    [disabled]="disabled"
    [required]="required"
    [min]="min"
    [max]="max"
    (change)="onDateChange($event)"
    (blur)="onDateBlur()"
  />
  <span *ngIf="hasError" class="form-error">{{ error }}</span>
  <span *ngIf="hint && !hasError" class="form-hint">{{ hint }}</span>
  <!-- placeholder text removed for date input to avoid duplicate native hints -->
</div>
