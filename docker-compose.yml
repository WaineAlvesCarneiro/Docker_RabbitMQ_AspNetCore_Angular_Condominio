services:
  api_angular_condominio:
    build:
      context: ./AngularAspNetCoreCondominio
      dockerfile: CondominioSaaSAngular.API/Dockerfile
    container_name: api_angular_condominio
    restart: unless-stopped
    ports:
      - "5004:8083"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__ApplicationDbContext: >
        Server=sqlserver2022,1433;
        Database=Condominio_aspnet_angular;
        User Id=sa;
        Password=Senh@ForteCondominio2026!;
        Encrypt=False;
        TrustServerCertificate=True;
        MultipleActiveResultSets=true
      Jwt__Key: wedaf7d4563b48e197b1507d492b708eSuperSecretKey2026
      Jwt__Issuer: CondominioSaaSAngular.API
      Jwt__Audience: CondominioSaaSAngular.API
      Jwt__ExpireMinutes: 15
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__UserName: guest
      RabbitMq__Password: guest
      RabbitMq__ExchangeName: email_exchange_angular
      RabbitMq__QueueName: fila_emails_angular
      RabbitMq__DeadLetterQueue: fila_emails_erro_angular
      RabbitMq__DeadLetterExchange: dlx_exchange_angular
      AdminSettings__UserName: Admin
      AdminSettings__Email: emailadmin@gmail.com
      AdminSettings__Password: 12345
      Security__EncryptionKey: MinhaChaveDeCriptografiaSuperSecreta
      Cors__AllowedOrigins: http://localhost:4200,https://localhost:4200,http://condominio_front_angular:4200
      Logging__LogLevel__Default: Information
      Logging__LogLevel__Microsoft: Warning
    volumes:
      - ./keys:/home/app/.aspnet/DataProtection-Keys
    networks:
      - infra_net
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8083/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  worker_angular_condominio:
    build:
      context: ./AngularAspNetCoreCondominio
      dockerfile: CondominioSaaSAngular.Worker/Dockerfile
    container_name: worker_angular_condominio
    restart: unless-stopped
    ports:
      - "5005:8084"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      RabbitMq__Host: rabbitmq
      RabbitMq__UserName: guest
      RabbitMq__Password: guest
      RabbitMq__Port: 5672
      RabbitMq__ExchangeName: email_exchange_angular
      RabbitMq__QueueName: fila_emails_angular
      RabbitMq__DeadLetterExchange: dlx_exchange_angular
      RabbitMq__DeadLetterQueue: fila_emails_erro_angular
    depends_on:
      api_angular_condominio:
        condition: service_healthy
    networks:
      - infra_net
  front_angular_condominio:
    build:
      context: ./angular_condominio
      dockerfile: Dockerfile
    container_name: front_angular_condominio
    restart: unless-stopped
    ports:
      - "4200:8085"
    environment:
      NODE_ENV: production
    depends_on:
      api_angular_condominio:
        condition: service_healthy
    networks:
      - infra_net

networks:
  infra_net:
    external: true
    name: infra_net
    driver: bridge